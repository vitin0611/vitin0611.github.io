<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to top, #fff3b0, #ffd60a);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Pantalla inicial */
.inicio {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 50px;
    color: #5c4d00;
    cursor: pointer;
    transition: opacity 1s ease;
}

.oculto {
    opacity: 0;
    pointer-events: none;
}

/* Escena */
.escena {
    opacity: 0;
    transition: opacity 2s ease;
}

.visible {
    opacity: 1;
}

/* Texto lado */
.mensaje {
    position: absolute;
    right: 8%;
    top: 35%;
    width: 300px;
    text-align: center;
    font-size: 22px;
    color: #5c4d00;
    line-height: 1.6;
    opacity: 0;
    transition: opacity 2s ease;

    background: rgba(255, 255, 255, 0.3);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(5px);
}

/* Contenedor planta */
.container {
    position: absolute;
    bottom: 0;
    left: 30%;
}

/* Tallo */
.stem {
    width: 6px;
    height: 0;
    background: #2e7d32;
    border-radius: 5px;
    animation: grow 4s forwards;
}

@keyframes grow {
    to { height: 320px; }
}

/* Hoja */
.leaf {
    position: absolute;
    width: 40px;
    height: 20px;
    background: #2e7d32;
    border-radius: 20px 0;
    transform: rotate(-30deg);
    opacity: 0;
    animation: aparecer 1s forwards;
}

/* Girasol GRANDE */
.sunflower {
    position: absolute;
    width: 100px;
    height: 100px;
    transform: scale(0);
    animation: bloom 0.8s forwards;
}

/* Centro */
.center {
    position: absolute;
    width: 40px;
    height: 40px;
    background: #5c3d00;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* Pétalos */
.petal {
    position: absolute;
    width: 30px;
    height: 15px;
    background: #ffcc00;
    border-radius: 10px;
    top: 50%;
    left: 50%;
    transform-origin: center left;
}

/* Animaciones */
@keyframes bloom {
    to { transform: scale(1); }
}

@keyframes aparecer {
    to { opacity: 1; }
}
</style>
</head>

<body>

<!-- Pantalla inicial -->
<div class="inicio" id="inicio" onclick="empezar()">
    💛 Para ti 💛
</div>

<!-- Escena -->
<div class="escena" id="escena">

    <div class="container">
        <div class="stem" id="stem"></div>
    </div>

    <div class="mensaje" id="mensaje">
        Te amo como los girasoles al sol 🌻<br><br>
        incluso en la oscuridad,<br>
        siempre encuentro la forma de volver hacia ti 💛<br><br>
        pase lo que pase ✨
    </div>

</div>

<script>
const inicio = document.getElementById("inicio");
const escena = document.getElementById("escena");
const stem = document.getElementById("stem");
const mensaje = document.getElementById("mensaje");

function empezar() {
    inicio.classList.add("oculto");

    setTimeout(() => {
        escena.classList.add("visible");

        setTimeout(crearPlanta, 4000);

        setTimeout(() => {
            mensaje.style.opacity = "1";
        }, 5000);

    }, 1000);
}

/* Hoja */
function hoja(top, left, delay) {
    const leaf = document.createElement("div");
    leaf.className = "leaf";
    leaf.style.top = top + "px";
    leaf.style.left = left + "px";
    leaf.style.animationDelay = delay + "s";
    stem.appendChild(leaf);
}

/* Girasol */
function girasol(top, left, delay) {
    const f = document.createElement("div");
    f.className = "sunflower";
    f.style.top = top + "px";
    f.style.left = left + "px";
    f.style.animationDelay = delay + "s";

    for (let i = 0; i < 12; i++) {
        const p = document.createElement("div");
        p.className = "petal";
        p.style.transform = `rotate(${i * 30}deg) translateX(25px)`;
        f.appendChild(p);
    }

    const c = document.createElement("div");
    c.className = "center";
    f.appendChild(c);

    stem.appendChild(f);
}

/* Crear planta */
function crearPlanta() {
    hoja(80, -35, 0);
    hoja(160, 5, 0.5);

    girasol(40, -40, 0);
    girasol(130, 30, 0.5);
    girasol(220, -50, 1);
    girasol(280, 25, 1.5);
}
</script>

</body>
</html>
