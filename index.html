<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas 💛</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #fff3b0, #ffd60a);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Contenido central */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #5c4d00;
}

h1 {
    font-size: 50px;
    margin-bottom: 10px;
}

p {
    font-size: 22px;
}

/* Botón */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #ffcc00;
    color: #5c4d00;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ffdb4d;
    transform: scale(1.1);
}

/* Flores */
.flower {
    position: absolute;
    width: 20px;
    height: 20px;
    background: radial-gradient(circle, #ffea00, #ffb700);
    border-radius: 50%;
    animation: fall linear infinite;
}

@keyframes fall {
    0% {
        transform: translateY(-10vh) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(110vh) scale(0.8);
        opacity: 0;
    }
}

/* Mensaje oculto */
.mensaje {
    display: none;
    margin-top: 20px;
    font-size: 20px;
    animation: fade 1s ease;
}

@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>

</head>

<body>

<div class="container">
    <h1>🌼 Flores Amarillas 🌼</h1>
    <p>Para la persona que cambio mi vida 💛</p>

    <button onclick="mostrar()">Toca aquí 💌</button>

    <div class="mensaje" id="msg">
        Eres lo mejor que me ha pasado 💛<br>
        Gracias por ser parte de mi ✨
    </div>
</div>

<script>
function mostrar() {
    document.getElementById("msg").style.display = "block";
}

/* Animación de flores */
function crearFlor() {
    const flor = document.createElement("div");
    flor.classList.add("flower");

    flor.style.left = Math.random() * 100 + "vw";
    flor.style.animationDuration = (4 + Math.random() * 4) + "s";

    document.body.appendChild(flor);

    setTimeout(() => {
        flor.remove();
    }, 8000);
}

setInterval(crearFlor, 200);
</script>

</body>
</html>
